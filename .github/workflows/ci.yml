name: CI - Next.js Template

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: nextjs/package-lock.json

    - name: Install dependencies
      run: |
        cd nextjs
        npm ci

    - name: Run tests
      run: |
        cd nextjs
        npm test
